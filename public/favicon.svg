<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#080818"/>
  <!-- Cannon barrel -->
  <rect x="14" y="6" width="4" height="12" rx="2" fill="#00e5ff" filter="url(#glow)"/>
  <!-- Cannon base -->
  <circle cx="16" cy="20" r="5" fill="#001f2e" stroke="#00e5ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Ball being shot -->
  <circle cx="16" cy="10" r="3" fill="#ff2d55" filter="url(#glow2)"/>
  <!-- Number on ball -->
  <text x="16" y="13.5" text-anchor="middle" font-size="5" font-weight="900" fill="white" font-family="monospace">7</text>
  <!-- Small bullets trail -->
  <circle cx="16" cy="4"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="16" cy="1"  r="1"   fill="white" opacity="0.3"/>
  <!-- Glow filters -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
